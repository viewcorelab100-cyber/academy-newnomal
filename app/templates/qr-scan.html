<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 체크인 - 학원 관리 시스템</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1f2937;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 48px;
            text-align: center;
        }
        
        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 32px;
        }
        
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .btn {
            padding: 48px 24px;
            border: none;
            border-radius: 16px;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-in {
            background: #10b981;
            color: white;
        }
        
        .btn-in:hover {
            background: #059669;
            transform: scale(1.05);
        }
        
        .btn-out {
            background: #f59e0b;
            color: white;
        }
        
        .btn-out:hover {
            background: #d97706;
            transform: scale(1.05);
        }
        
        .result {
            padding: 24px;
            border-radius: 12px;
            margin-top: 24px;
            display: none;
        }
        
        .result.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .result.error {
            background: #fee;
            color: #c33;
        }
        
        .result h2 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        
        .result p {
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚪 출입 체크</h1>
        
        <p id="studentName" style="font-size: 20px; color: #666; margin-bottom: 24px;">
            학생 정보 로딩 중...
        </p>
        
        <div class="btn-group">
            <button class="btn btn-in" onclick="checkIn()">
                🏫<br>등원
            </button>
            <button class="btn btn-out" onclick="checkOut()">
                🏠<br>하원
            </button>
        </div>
        
        <div id="result" class="result">
            <h2 id="resultTitle"></h2>
            <p id="resultMessage"></p>
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const qrCode = urlParams.get('code');
        
        let studentInfo = null;
        
        window.addEventListener('DOMContentLoaded', async () => {
            if (!qrCode) {
                showError('QR 코드가 없습니다');
                return;
            }
            
            await loadStudentInfo();
        });
        
        async function loadStudentInfo() {
            try {
                const response = await fetch(`/student/info/${qrCode}`);
                
                if (!response.ok) throw new Error('유효하지 않은 QR 코드입니다');
                
                studentInfo = await response.json();
                
                document.getElementById('studentName').textContent = 
                    `${studentInfo.name} 학생`;
                
                if (!studentInfo.is_connected) {
                    showError('카카오 계정이 연동되지 않은 학생입니다');
                }
            } catch (error) {
                showError(error.message);
            }
        }
        
        async function checkIn() {
            await doCheckIn('in');
        }
        
        async function checkOut() {
            await doCheckIn('out');
        }
        
        async function doCheckIn(type) {
            if (!studentInfo || !studentInfo.is_connected) {
                showError('학생 정보를 확인할 수 없습니다');
                return;
            }
            
            const typeKr = type === 'in' ? '등원' : '하원';
            
            try {
                const response = await fetch(`/student/checkin?qr_code=${qrCode}&type=${type}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess(
                        `${typeKr} 완료!`,
                        `${data.student_name}님의 ${data.type}이 체크되었습니다.\n시간: ${data.timestamp}`
                    );
                } else {
                    throw new Error(data.detail || '체크 실패');
                }
            } catch (error) {
                showError(error.message);
            }
        }
        
        function showSuccess(title, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result success';
            resultDiv.style.display = 'block';
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultMessage').textContent = message;
            
            // 3초 후 자동으로 사라짐
            setTimeout(() => {
                resultDiv.style.display = 'none';
            }, 5000);
        }
        
        function showError(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result error';
            resultDiv.style.display = 'block';
            document.getElementById('resultTitle').textContent = '오류';
            document.getElementById('resultMessage').textContent = message;
        }
    </script>
</body>
</html>
